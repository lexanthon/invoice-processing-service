#
# JDBC properties
#
spring.datasource.url=jdbc:mysql://localhost:3306/lexanthon?useUnicode=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=YOUR_DB_USERNAME
spring.datasource.password=YOUR_DB_PASSWORD

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Hibernate ddl auto (create, create-drop, validate,update)
#spring.datasource.data=classpath:org/springframework/session/jdbc/schema-mysql.sql
spring.jpa.hibernate.ddl-auto = create
spring.jpa.properties.hibernate.connection.characterEncoding=utf-8 
spring.jpa.properties.hibernate.connection.CharSet=utf-8 
spring.jpa.properties.hibernate.connection.useUnicode=true 
#create-drop
#update



spring.jpa.show-sql=false


logging.level.io.github.lexanthon.invoiceparser.utils=DEBUG
logging.level.com.parserlog=DEBUG
timer=0/3 * * * * ?


